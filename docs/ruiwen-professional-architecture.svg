<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 760" width="1320" height="760" role="img" aria-label="RuiWen professional architecture diagram">
  <defs>
    <style>
      .title { font: 700 24px 'Inter', 'Segoe UI', sans-serif; fill: #111827; }
      .subtitle { font: 400 13px 'Inter', 'Segoe UI', sans-serif; fill: #6b7280; }
      .section { font: 700 13px 'Inter', 'Segoe UI', sans-serif; fill: #4b5563; }
      .label { font: 600 14px 'Inter', 'Segoe UI', sans-serif; fill: #111827; }
      .anno { font: 400 12px 'Inter', 'Segoe UI', sans-serif; fill: #6b7280; }
      .frame { fill: #ffffff; stroke: #d1d5db; }
      .panel { fill: #f9fafb; stroke: #d1d5db; }
      .box-soft { fill: #eef2ff; stroke: #cbd5e1; }
      .box-core { fill: #dbeafe; stroke: #2563eb; }
      .box-infra { fill: #e5e7eb; stroke: #9ca3af; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .arrow-accent { stroke: #2563eb; stroke-width: 2; fill: none; }
      .arrow-dash { stroke: #6b7280; stroke-width: 2; fill: none; stroke-dasharray: 6 4; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrowHeadAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb" />
    </marker>
    <marker id="arrowHeadDash" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1280" height="720" rx="18" class="frame" />

  <text x="60" y="68" class="title">Line / RuiWen Backend Architecture</text>
  <text x="60" y="98" class="subtitle">Layered view, core data flows, and eventual consistency pipeline</text>

  <rect x="50" y="130" width="1220" height="100" rx="16" class="panel" />
  <text x="70" y="160" class="section">Access Layer</text>
  <rect x="90" y="175" width="180" height="34" rx="12" class="box-soft" />
  <text x="180" y="196" text-anchor="middle" class="label">Web / Mobile Client</text>
  <rect x="320" y="175" width="200" height="34" rx="12" class="box-soft" />
  <text x="420" y="196" text-anchor="middle" class="label">REST API / SSE</text>
  <rect x="570" y="175" width="220" height="34" rx="12" class="box-soft" />
  <text x="680" y="196" text-anchor="middle" class="label">Spring Security + JWT</text>
  <rect x="840" y="175" width="180" height="34" rx="12" class="box-soft" />
  <text x="930" y="196" text-anchor="middle" class="label">Validation / CORS</text>

  <rect x="50" y="260" width="1220" height="170" rx="16" class="panel" />
  <text x="70" y="290" class="section">Domain Service Layer</text>
  <rect x="90" y="315" width="140" height="40" rx="12" class="box-core" />
  <text x="160" y="339" text-anchor="middle" class="label">Auth</text>
  <rect x="260" y="315" width="140" height="40" rx="12" class="box-core" />
  <text x="330" y="339" text-anchor="middle" class="label">Profile</text>
  <rect x="430" y="315" width="160" height="40" rx="12" class="box-core" />
  <text x="510" y="339" text-anchor="middle" class="label">KnowPost</text>
  <rect x="620" y="315" width="140" height="40" rx="12" class="box-core" />
  <text x="690" y="339" text-anchor="middle" class="label">Relation</text>
  <rect x="790" y="315" width="140" height="40" rx="12" class="box-core" />
  <text x="860" y="339" text-anchor="middle" class="label">Counter</text>
  <rect x="960" y="315" width="160" height="40" rx="12" class="box-core" />
  <text x="1040" y="339" text-anchor="middle" class="label">Leaderboard</text>
  <rect x="180" y="372" width="140" height="40" rx="12" class="box-core" />
  <text x="250" y="396" text-anchor="middle" class="label">Search</text>
  <rect x="380" y="372" width="140" height="40" rx="12" class="box-core" />
  <text x="450" y="396" text-anchor="middle" class="label">Storage</text>
  <rect x="580" y="372" width="140" height="40" rx="12" class="box-core" />
  <text x="650" y="396" text-anchor="middle" class="label">LLM / RAG</text>
  <rect x="780" y="372" width="180" height="40" rx="12" class="box-core" />
  <text x="870" y="396" text-anchor="middle" class="label">Cache Orchestration</text>

  <rect x="50" y="460" width="1220" height="130" rx="16" class="panel" />
  <text x="70" y="490" class="section">Infrastructure and Middleware</text>
  <rect x="90" y="520" width="150" height="40" rx="12" class="box-infra" />
  <text x="165" y="544" text-anchor="middle" class="label">MySQL</text>
  <rect x="275" y="520" width="150" height="40" rx="12" class="box-infra" />
  <text x="350" y="544" text-anchor="middle" class="label">Redis</text>
  <rect x="460" y="520" width="150" height="40" rx="12" class="box-infra" />
  <text x="535" y="544" text-anchor="middle" class="label">Kafka</text>
  <rect x="645" y="520" width="170" height="40" rx="12" class="box-infra" />
  <text x="730" y="544" text-anchor="middle" class="label">Elasticsearch</text>
  <rect x="850" y="520" width="150" height="40" rx="12" class="box-infra" />
  <text x="925" y="544" text-anchor="middle" class="label">Canal</text>
  <rect x="1035" y="520" width="150" height="40" rx="12" class="box-infra" />
  <text x="1110" y="544" text-anchor="middle" class="label">Aliyun OSS</text>

  <rect x="50" y="620" width="1220" height="90" rx="16" class="panel" />
  <text x="70" y="650" class="section">External AI Capability Layer</text>
  <rect x="420" y="665" width="220" height="34" rx="12" class="box-soft" />
  <text x="530" y="686" text-anchor="middle" class="label">Embedding / Rerank / Chat Model</text>
  <rect x="690" y="665" width="180" height="34" rx="12" class="box-soft" />
  <text x="780" y="686" text-anchor="middle" class="label">Vector Retrieval</text>

  <line x1="270" y1="192" x2="320" y2="192" class="arrow-accent" marker-end="url(#arrowHeadAccent)" />
  <line x1="520" y1="192" x2="570" y2="192" class="arrow-accent" marker-end="url(#arrowHeadAccent)" />
  <line x1="790" y1="192" x2="840" y2="192" class="arrow-accent" marker-end="url(#arrowHeadAccent)" />

  <line x1="510" y1="230" x2="510" y2="300" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="680" y1="230" x2="680" y2="300" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="930" y1="230" x2="930" y2="300" class="arrow" marker-end="url(#arrowHead)" />

  <line x1="160" y1="355" x2="160" y2="510" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="500" y1="355" x2="160" y2="510" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="500" y1="355" x2="350" y2="510" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="690" y1="355" x2="160" y2="510" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="860" y1="355" x2="535" y2="510" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="1040" y1="355" x2="535" y2="510" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="250" y1="392" x2="730" y2="510" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="450" y1="392" x2="1110" y2="510" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="650" y1="392" x2="730" y2="510" class="arrow" marker-end="url(#arrowHead)" />
  <line x1="870" y1="392" x2="350" y2="510" class="arrow" marker-end="url(#arrowHead)" />

  <line x1="160" y1="560" x2="850" y2="540" class="arrow-dash" marker-end="url(#arrowHeadDash)" />
  <line x1="850" y1="540" x2="535" y2="540" class="arrow-dash" marker-end="url(#arrowHeadDash)" />
  <line x1="850" y1="540" x2="730" y2="540" class="arrow-dash" marker-end="url(#arrowHeadDash)" />
  <line x1="730" y1="560" x2="520" y2="682" class="arrow-accent" marker-end="url(#arrowHeadAccent)" />
  <line x1="730" y1="560" x2="690" y2="682" class="arrow-accent" marker-end="url(#arrowHeadAccent)" />

  <text x="905" y="530" class="anno">binlog / outbox</text>
  <text x="530" y="494" class="anno">async events</text>
  <text x="720" y="638" class="anno">semantic retrieval</text>
</svg>
