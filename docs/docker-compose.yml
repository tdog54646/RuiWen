version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ruiwen-mysql
    restart: always
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: ruiwen
      TZ: UTC
    command:
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --server-id=1
    volumes:
      - ./docs/mysql/data:/var/lib/mysql
      - ./docs/mysql:/docker-entrypoint-initdb.d
    networks:
      - ruiwen-net

  redis:
    image: redis:7.2-alpine
    container_name: ruiwen-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass 1234
    volumes:
      - ./docs/redis/data:/data
    networks:
      - ruiwen-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: ruiwen-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: 4L62no9pSFm676Y8v_A9LA
    volumes:
      - ./docs/kafka/data:/var/lib/kafka/data
    networks:
      - ruiwen-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.1
    container_name: ruiwen-es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
    volumes:
      - ./docs/elasticsearch/data:/usr/share/elasticsearch/data
    networks:
      - ruiwen-net

  canal:
    image: canal/canal-server:v1.1.7
    container_name: ruiwen-canal
    restart: always
    ports:
      - "11111:11111"
    environment:
      # Use the service name 'mysql' instead of localhost
      - canal.instance.master.address=mysql:3306
      - canal.instance.dbUsername=canal
      - canal.instance.dbPassword=Canal@123456
      - canal.instance.connectionCharset=UTF-8
      - canal.instance.tsdb.enable=true
      - canal.instance.gtidon=false
      - canal.instance.filter.regex=ruiwen\.outbox
    depends_on:
      - mysql
    volumes:
      - ./docs/canal/logs:/admin/canal-server/logs
    networks:
      - ruiwen-net

networks:
  ruiwen-net:
    driver: bridge